<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Planet Merge — Level Editor</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #14082c;
      color: #ece4ff;
      display: flex;
      height: 100vh;
      overflow: hidden;
    }

    /* ---- Left control panel ---- */
    #panel {
      width: 360px;
      min-width: 360px;
      height: 100%;
      overflow-y: auto;
      padding: 16px 18px 60px;
      background: #1c0f3a;
      border-right: 1px solid #3a2566;
    }
    #panel h1 { font-size: 1.15em; margin: 0 0 4px; }
    #panel .sub { font-size: 0.78em; color: #a78fd6; margin: 0 0 16px; }

    .section { margin-bottom: 18px; }
    .section > .section-title {
      font-size: 0.72em;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #b69cf0;
      margin-bottom: 8px;
      border-bottom: 1px solid #34215e;
      padding-bottom: 4px;
    }

    label.field { display: block; font-size: 0.8em; margin-bottom: 8px; color: #cdbdf2; }
    label.field span { display: block; margin-bottom: 3px; }
    input[type=text], input[type=number], select, textarea {
      width: 100%;
      padding: 6px 8px;
      border-radius: 7px;
      border: 1px solid #45316f;
      background: #2a1a4d;
      color: #fff;
      font-size: 0.95em;
      font-family: inherit;
    }
    .row { display: flex; gap: 8px; }
    .row > * { flex: 1; }

    button {
      cursor: pointer;
      border: none;
      border-radius: 8px;
      padding: 8px 12px;
      font-size: 0.85em;
      font-weight: 600;
      font-family: inherit;
      color: #fff;
      background: #6c3fd4;
      transition: filter 0.12s, transform 0.05s;
    }
    button:hover { filter: brightness(1.12); }
    button:active { transform: scale(0.97); }
    button.ghost { background: #2f1f55; border: 1px solid #4a356f; }
    button.ok { background: #2e9e5b; }
    button.warn { background: #c0392b; }
    button.small { padding: 4px 8px; font-size: 0.78em; }

    /* tool palette */
    .tools { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; }
    .tool-btn { background: #2f1f55; border: 1px solid #4a356f; padding: 8px 4px; font-size: 0.78em; }
    .tool-btn.active { background: #6c3fd4; border-color: #9b6bff; box-shadow: 0 0 0 2px rgba(155,107,255,0.4); }

    .tier-palette { display: grid; grid-template-columns: repeat(6, 1fr); gap: 4px; margin-top: 8px; }
    .tier-cell {
      aspect-ratio: 1; display: flex; align-items: center; justify-content: center;
      font-size: 1.15em; border-radius: 6px; background: #2a1a4d; border: 1px solid #45316f; cursor: pointer;
    }
    .tier-cell.active { background: #6c3fd4; border-color: #9b6bff; }

    .goal-row { display: flex; gap: 6px; align-items: center; margin-bottom: 6px; }
    .goal-row select, .goal-row input { padding: 4px 6px; font-size: 0.82em; }
    .goal-row .del { background: #c0392b; padding: 4px 8px; }

    .actions { margin-top: 8px; }
    .actions button { width: 100%; margin-top: 8px; padding: 11px; font-size: 0.95em; }

    #status { font-size: 0.78em; margin-top: 10px; min-height: 1.2em; color: #8fe6a8; }
    #status.err { color: #ff9b8f; }

    textarea#export { height: 150px; font-family: ui-monospace, monospace; font-size: 0.72em; white-space: pre; }

    /* ---- Right canvas stage ---- */
    #stage {
      flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
      padding: 18px; gap: 12px; background:
        radial-gradient(circle at 30% 20%, #241046, #0e0620 70%);
    }
    #canvas-frame {
      position: relative; border-radius: 22px; overflow: hidden;
      border: 2px solid #4a356f; box-shadow: 0 18px 50px rgba(0,0,0,0.5);
      background: #0c0420;
    }
    #editor-canvas { display: block; touch-action: none; cursor: crosshair; }
    #hint-bar {
      font-size: 0.82em; color: #c7b6f0; text-align: center; max-width: 540px; line-height: 1.5;
      background: rgba(40,22,80,0.6); padding: 8px 14px; border-radius: 10px;
    }
    kbd { background:#2f1f55; border:1px solid #5b4490; border-radius:4px; padding:0 5px; font-size:0.92em; }
  </style>
</head>
<body>
  <div id="panel">
    <h1>🪐 Level Editor</h1>

    <div class="section">
      <div class="section-title">Level</div>
      <label class="field">
        <span>Chọn level để sửa</span>
        <select id="level-select"></select>
      </label>
      <label class="field"><span>ID</span><input type="number" id="f-id"></label>
    </div>

    <div class="section">
      <div class="section-title">Thông số</div>
      <div class="row">
        <label class="field"><span>Orbit radius</span><input type="number" id="f-orbitRadius"></label>
        <label class="field"><span>Warning limit</span><input type="number" id="f-warningLimit"></label>
      </div>
      <div class="row">
        <label class="field"><span>Launcher speed</span><input type="number" step="0.05" id="f-launcherSpeed"></label>
        <label class="field"><span>Max spawns</span><input type="number" id="f-maxSpawns"></label>
      </div>
      <label class="field"><span>Max spawn tier (0–10)</span><input type="number" min="0" max="10" id="f-maxSpawnTier"></label>
      <div class="row">
        <label class="field"><span>★ 1</span><input type="number" id="f-star1"></label>
        <label class="field"><span>★★ 2</span><input type="number" id="f-star2"></label>
        <label class="field"><span>★★★ 3</span><input type="number" id="f-star3"></label>
      </div>
    </div>

    <div class="section">
      <div class="section-title">Mục tiêu (Goals)</div>
      <div id="goals-list"></div>
      <button class="ghost small" id="add-goal-btn">+ Thêm goal</button>
    </div>

    <div class="section">
      <div class="section-title">Công cụ đặt trên sân</div>
      <div class="tools">
        <button class="tool-btn" data-tool="fruit">🍒 Quả</button>
        <button class="tool-btn" data-tool="center">⭐ Lõi</button>
        <button class="tool-btn" data-tool="blackhole">🕳️ Hố đen</button>
        <button class="tool-btn" data-tool="shrink">🟦 Vùng co</button>
        <button class="tool-btn" data-tool="portal">🌀 Cổng</button>
        <button class="tool-btn" data-tool="select">✋ Di chuyển</button>
      </div>
      <div id="tier-wrap" class="section" style="margin-top:10px;">
        <div style="font-size:0.78em;color:#b69cf0;margin-bottom:4px;">Tier quả khi đặt:</div>
        <div class="tier-palette" id="tier-palette"></div>
      </div>
      <label class="field" id="bh-radius-wrap" style="margin-top:10px;display:none;">
        <span>Bán kính hố đen</span><input type="number" id="f-bhRadius" value="20">
      </label>
    </div>

    <div class="section actions">
      <button class="ok" id="save-btn">💾 Lưu vào level.js</button>
      <button id="test-btn">▶ Test ngay (engine thật)</button>
      <button class="ghost" id="export-btn">📋 Xem / Copy code</button>
      <button class="ghost" id="clear-field-btn">🧹 Xoá hết vật thể trên sân</button>
      <div id="status"></div>
      <textarea id="export" style="display:none;" readonly></textarea>
    </div>
  </div>

  <div id="stage">
    <div id="hint-bar"></div>
    <div id="canvas-frame">
      <canvas id="editor-canvas" width="520" height="680"></canvas>
    </div>
  </div>

  <!-- Reuse the game's fruit configs + rendering -->
  <script src="physics.js"></script>
  <script src="level.js"></script>
  <script src="editor.js"></script>
</body>
</html>
